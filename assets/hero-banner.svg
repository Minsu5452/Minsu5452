<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Minsu Kang — ML Engineer on DACON DataScience team">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.6" stop-color="#0E1428"/>
      <stop offset="1" stop-color="#121933"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6D9DFF" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#6D9DFF"/>
      <stop offset="1" stop-color="#3E5BA0" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6D9DFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6D9DFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#6D9DFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6D9DFF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6D9DFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Subtle ambient glow behind motif -->
  <ellipse cx="960" cy="210" rx="280" ry="180" fill="url(#glow)"/>

  <!-- ========== LEFT: type tower ========== -->
  <g transform="translate(72, 92)">
    <!-- eyebrow -->
    <text font-family="JetBrains Mono, Menlo, monospace" font-size="13" fill="#6D9DFF" letter-spacing="4">
      DACON · DATA SCIENCE TEAM
    </text>

    <!-- name -->
    <text y="52" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="58" fill="#E6ECFF" letter-spacing="-1">
      MINSU KANG
    </text>

    <!-- divider -->
    <line x1="0" y1="76" x2="120" y2="76" stroke="#6D9DFF" stroke-width="2"/>

    <!-- title -->
    <text y="108" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="20" fill="#9AA8D8">
      ML Engineer · Data Scientist
    </text>

    <!-- pitch, two lines -->
    <text y="152" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="17" fill="#9AA8D8">
      Ranked 34 / 122,781 on DACON as a competitor —
    </text>
    <text y="176" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="17" fill="#E6ECFF">
      now building the platform from inside the team.
    </text>

    <!-- award pill row -->
    <g transform="translate(0, 208)">
      <!-- 1st pill -->
      <rect rx="6" ry="6" width="104" height="32" fill="#E5B13A" opacity="0.12" stroke="#E5B13A" stroke-width="1"/>
      <text x="52" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#E5B13A" font-weight="700">
        🥇 1st DACON
      </text>

      <!-- 2nd pill -->
      <g transform="translate(116, 0)">
        <rect rx="6" ry="6" width="104" height="32" fill="#B7BFC9" opacity="0.12" stroke="#B7BFC9" stroke-width="1"/>
        <text x="52" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#B7BFC9" font-weight="700">
          🥈 2nd DACON
        </text>
      </g>

      <!-- 2nd HD pill -->
      <g transform="translate(232, 0)">
        <rect rx="6" ry="6" width="124" height="32" fill="#B7BFC9" opacity="0.12" stroke="#B7BFC9" stroke-width="1"/>
        <text x="62" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#B7BFC9" font-weight="700">
          🥈 2nd HD HYUNDAI
        </text>
      </g>
    </g>
  </g>

  <!-- ========== RIGHT: motif — data → model → decision ========== -->
  <g transform="translate(740, 80)">
    <!-- column 1 — raw data dots (7×7 grid, mixed opacity) -->
    <g>
      <text x="60" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6D9DFF" letter-spacing="2" opacity="0.8">DATA</text>
      <g fill="#6D9DFF">
        <!-- row 1 --><circle cx="20" cy="10" r="3" opacity="0.35"/><circle cx="40" cy="10" r="3" opacity="0.8"/><circle cx="60" cy="10" r="3" opacity="0.45"/><circle cx="80" cy="10" r="3" opacity="0.9"/><circle cx="100" cy="10" r="3" opacity="0.3"/>
        <!-- row 2 --><circle cx="20" cy="30" r="3" opacity="0.6"/><circle cx="40" cy="30" r="3" opacity="0.3"/><circle cx="60" cy="30" r="3" opacity="0.85"/><circle cx="80" cy="30" r="3" opacity="0.4"/><circle cx="100" cy="30" r="3" opacity="0.7"/>
        <!-- row 3 --><circle cx="20" cy="50" r="3" opacity="0.4"/><circle cx="40" cy="50" r="3" opacity="0.75"/><circle cx="60" cy="50" r="3" opacity="0.55"/><circle cx="80" cy="50" r="3" opacity="0.3"/><circle cx="100" cy="50" r="3" opacity="0.9"/>
        <!-- row 4 --><circle cx="20" cy="70" r="3" opacity="0.85"/><circle cx="40" cy="70" r="3" opacity="0.4"/><circle cx="60" cy="70" r="3" opacity="0.7"/><circle cx="80" cy="70" r="3" opacity="0.55"/><circle cx="100" cy="70" r="3" opacity="0.35"/>
        <!-- row 5 --><circle cx="20" cy="90" r="3" opacity="0.3"/><circle cx="40" cy="90" r="3" opacity="0.95"/><circle cx="60" cy="90" r="3" opacity="0.4"/><circle cx="80" cy="90" r="3" opacity="0.8"/><circle cx="100" cy="90" r="3" opacity="0.5"/>
        <!-- row 6 --><circle cx="20" cy="110" r="3" opacity="0.6"/><circle cx="40" cy="110" r="3" opacity="0.3"/><circle cx="60" cy="110" r="3" opacity="0.9"/><circle cx="80" cy="110" r="3" opacity="0.45"/><circle cx="100" cy="110" r="3" opacity="0.7"/>
        <!-- row 7 --><circle cx="20" cy="130" r="3" opacity="0.4"/><circle cx="40" cy="130" r="3" opacity="0.7"/><circle cx="60" cy="130" r="3" opacity="0.55"/><circle cx="80" cy="130" r="3" opacity="0.35"/><circle cx="100" cy="130" r="3" opacity="0.85"/>
        <animate attributeName="opacity" values="1;0.7;1" dur="4s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- arrow 1 -->
    <g transform="translate(120, 65)">
      <line x1="0" y1="5" x2="36" y2="5" stroke="url(#fade)" stroke-width="1.5"/>
      <polygon points="36,2 42,5 36,8" fill="#6D9DFF" opacity="0.7"/>
    </g>

    <!-- column 2 — model (nested rects, radial) -->
    <g transform="translate(170, 20)">
      <text x="55" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6D9DFF" letter-spacing="2" opacity="0.8">MODEL</text>
      <!-- outer ring -->
      <circle cx="55" cy="55" r="52" fill="none" stroke="#6D9DFF" stroke-width="1" stroke-dasharray="2 4" opacity="0.4">
        <animateTransform attributeName="transform" type="rotate" from="0 55 55" to="360 55 55" dur="24s" repeatCount="indefinite"/>
      </circle>
      <!-- mid ring -->
      <circle cx="55" cy="55" r="36" fill="none" stroke="#6D9DFF" stroke-width="1" opacity="0.6"/>
      <!-- inner filled -->
      <circle cx="55" cy="55" r="20" fill="#6D9DFF" opacity="0.15" stroke="#6D9DFF" stroke-width="1.5"/>
      <!-- core -->
      <circle cx="55" cy="55" r="5" fill="#6D9DFF">
        <animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <!-- node lines -->
      <g stroke="#6D9DFF" stroke-width="1" opacity="0.5">
        <line x1="55" y1="19" x2="55" y2="35"/>
        <line x1="55" y1="75" x2="55" y2="91"/>
        <line x1="19" y1="55" x2="35" y2="55"/>
        <line x1="75" y1="55" x2="91" y2="55"/>
      </g>
      <!-- 4 small nodes -->
      <g fill="#6D9DFF">
        <circle cx="55" cy="15" r="2.5"/>
        <circle cx="55" cy="95" r="2.5"/>
        <circle cx="15" cy="55" r="2.5"/>
        <circle cx="95" cy="55" r="2.5"/>
      </g>
    </g>

    <!-- arrow 2 -->
    <g transform="translate(295, 65)">
      <line x1="0" y1="5" x2="36" y2="5" stroke="url(#fade)" stroke-width="1.5"/>
      <polygon points="36,2 42,5 36,8" fill="#6D9DFF" opacity="0.7"/>
    </g>

    <!-- column 3 — decision (single bold signal line rising) -->
    <g transform="translate(345, 20)">
      <text x="55" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6D9DFF" letter-spacing="2" opacity="0.8">DECIDE</text>
      <!-- horizontal grid -->
      <g stroke="#1F2A4C" stroke-width="1">
        <line x1="0" y1="30" x2="110" y2="30"/>
        <line x1="0" y1="55" x2="110" y2="55"/>
        <line x1="0" y1="80" x2="110" y2="80"/>
        <line x1="0" y1="105" x2="110" y2="105"/>
      </g>
      <!-- rising signal path -->
      <path d="M 0 95 L 18 88 L 36 75 L 54 62 L 72 48 L 90 30 L 110 18"
            fill="none" stroke="#6D9DFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0 200;200 0" dur="3s" fill="freeze"/>
      </path>
      <!-- endpoint pulse -->
      <circle cx="110" cy="18" r="4" fill="#6D9DFF">
        <animate attributeName="r" values="4;7;4" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="110" cy="18" r="4" fill="none" stroke="#6D9DFF" stroke-width="1.5" opacity="0.6">
        <animate attributeName="r" values="4;12;4" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- bottom accent stripe -->
  <rect y="412" width="1200" height="8" fill="url(#stripe)"/>
</svg>
