name: Generate snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Minsu5452
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#6D9DFF&color_dots=#1F2A4C,#2E3D6E,#3E5BA0,#6D9DFF,#A8C2FF
            dist/github-contribution-grid-snake-light.svg?palette=github-light&color_snake=#3E5BA0&color_dots=#E6ECFF,#A8C2FF,#6D9DFF,#3E5BA0,#1F2A4C

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
