<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0c0c0d"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a6b3f" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4a574" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8a6b3f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="goldDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6e3ba"/>
      <stop offset="100%" stop-color="#b5874f"/>
    </radialGradient>
    <radialGradient id="silverDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ededed"/>
      <stop offset="100%" stop-color="#9aa0a6"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- ─── TITLE BLOCK ─── -->
  <text x="100" y="64" fill="#606060"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="10" letter-spacing="7" font-weight="500">
    M · K &nbsp;·&nbsp; C O M P E T I T I O N &nbsp;·&nbsp; H I S T O R Y
  </text>

  <text x="100" y="122" fill="#eceff3"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="48" font-weight="700" letter-spacing="-1.5">
    Minsu Kang.
  </text>
  <text x="100" y="150" fill="#8b949e"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="14" font-weight="400" letter-spacing="0.2">
    13 competitions plotted below. Higher is better.
  </text>

  <!-- DACON Rank card top-right -->
  <g>
    <line x1="960" y1="60" x2="1120" y2="60" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="960" y="86" fill="#606060"
          font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
          font-size="9" letter-spacing="4" font-weight="500">
      D A C O N &nbsp;·&nbsp; P E A K
    </text>
    <text x="960" y="114" fill="#eceff3"
          font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
          font-size="22" font-weight="700" letter-spacing="-0.3">
      34 / 122,781
    </text>
    <text x="960" y="138" fill="#d4a574"
          font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
          font-size="12" font-weight="500" letter-spacing="0.5">
      Challenger &nbsp;·&nbsp; top 0.1%
    </text>
  </g>

  <!-- ─── PLOT AREA ─── -->
  <!-- chart frame: x = 150 .. 1140, y = 180 .. 340 -->

  <!-- Tier bands (subtle fills) -->
  <rect x="150" y="180" width="990" height="54" fill="#d4a574" fill-opacity="0.018"/>
  <rect x="150" y="236" width="990" height="30" fill="#2cb1bc" fill-opacity="0.018"/>
  <rect x="150" y="268" width="990" height="28" fill="#2cb1bc" fill-opacity="0.01"/>
  <rect x="150" y="298" width="990" height="22" fill="#ffffff" fill-opacity="0.01"/>

  <!-- Tier divider lines -->
  <line x1="150" y1="234" x2="1140" y2="234" stroke="#d4a574" stroke-width="0.5" opacity="0.55"/>
  <line x1="150" y1="266" x2="1140" y2="266" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="150" y1="296" x2="1140" y2="296" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="150" y1="320" x2="1140" y2="320" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="2,4"/>
  <!-- Baseline -->
  <line x1="150" y1="344" x2="1140" y2="344" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Tier labels -->
  <text x="142" y="211" text-anchor="end" fill="#d4a574" opacity="0.95"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="9" letter-spacing="3" font-weight="600">
    M E D A L
  </text>
  <text x="142" y="254" text-anchor="end" fill="#8b949e"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="9" letter-spacing="3" font-weight="500">
    T O P &nbsp; 1 0 %
  </text>
  <text x="142" y="284" text-anchor="end" fill="#6e7681"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="9" letter-spacing="3" font-weight="500">
    T O P &nbsp; 2 0 %
  </text>
  <text x="142" y="312" text-anchor="end" fill="#555b62"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="9" letter-spacing="3" font-weight="500">
    T O P &nbsp; 5 0 %
  </text>
  <text x="142" y="335" text-anchor="end" fill="#404549"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="9" letter-spacing="3" font-weight="500">
    P R E L I M
  </text>

  <!-- ─── YEAR X-AXIS ─── -->
  <!-- Year separators (subtle) -->
  <line x1="350" y1="180" x2="350" y2="344" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="1,6"/>
  <line x1="910" y1="180" x2="910" y2="344" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="1,6"/>

  <text x="240" y="370" text-anchor="middle" fill="#606060"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="11" letter-spacing="4" font-weight="600">2022</text>
  <text x="620" y="370" text-anchor="middle" fill="#606060"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="11" letter-spacing="4" font-weight="600">2023</text>
  <text x="1020" y="370" text-anchor="middle" fill="#606060"
        font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
        font-size="11" letter-spacing="4" font-weight="600">2025</text>

  <!-- ─── MEDAL POINTS (large, gold/silver) ─── -->

  <!-- Genomic · 2023 · 1st -->
  <g>
    <title>Genomic Breed Classification · 2023 · 1st of 716 teams</title>
    <line x1="430" y1="344" x2="430" y2="200" stroke="#d4a574" stroke-width="0.6" opacity="0.35"/>
    <circle cx="430" cy="200" r="11" fill="url(#goldDot)"/>
    <circle cx="430" cy="200" r="15" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.45"/>
    <text x="430" y="204" text-anchor="middle" fill="#0a0a0a"
          font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
          font-size="11" font-weight="700">1</text>
  </g>
  <text x="430" y="178" text-anchor="middle" fill="#e8c584"
        font-family="Georgia,'Times New Roman',serif"
        font-size="12" font-style="italic">Genomic</text>

  <!-- Court Judgment · 2023 · 2nd -->
  <g>
    <title>Court Judgment Prediction · 2023 · 2nd (score-tied with 1st)</title>
    <line x1="540" y1="344" x2="540" y2="214" stroke="#c9c9c9" stroke-width="0.6" opacity="0.3"/>
    <circle cx="540" cy="214" r="9" fill="url(#silverDot)"/>
    <text x="540" y="218" text-anchor="middle" fill="#0a0a0a"
          font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
          font-size="10" font-weight="700">2</text>
  </g>
  <text x="540" y="194" text-anchor="middle" fill="#c9c9c9"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" font-style="italic">Court</text>

  <!-- HD Hyundai · 2023 · prelim 2nd of 330 -->
  <g>
    <title>HD Hyundai AI Challenge · 2023 · prelim 2 of 330 (final 6/11)</title>
    <line x1="780" y1="344" x2="780" y2="222" stroke="#c9c9c9" stroke-width="0.6" opacity="0.3"/>
    <circle cx="780" cy="222" r="9" fill="url(#silverDot)"/>
    <text x="780" y="226" text-anchor="middle" fill="#0a0a0a"
          font-family="-apple-system,'SF Pro Display','Inter',sans-serif"
          font-size="10" font-weight="700">2</text>
  </g>
  <text x="780" y="202" text-anchor="middle" fill="#c9c9c9"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" font-style="italic">HD Hyundai <tspan font-size="9" fill="#808890">(prelim)</tspan></text>

  <!-- ─── TOP 10% POINTS (teal) ─── -->

  <!-- LG Aimers · 2023 · Top 2% -->
  <g>
    <title>LG Aimers · Online Product Sales · 2023 · Top 2% (12 of 747)</title>
    <line x1="610" y1="344" x2="610" y2="244" stroke="#2cb1bc" stroke-width="0.5" opacity="0.25"/>
    <circle cx="610" cy="244" r="5.5" fill="#2cb1bc"/>
  </g>

  <!-- Kookmin · 2025 · Top 6% -->
  <g>
    <title>Kookmin 3rd AI·BigData · 2025 · Top 6% (50 of 960)</title>
    <line x1="1050" y1="344" x2="1050" y2="251" stroke="#2cb1bc" stroke-width="0.5" opacity="0.25"/>
    <circle cx="1050" cy="251" r="5" fill="#2cb1bc"/>
  </g>

  <!-- Citrus · 2022 · Top 7% -->
  <g>
    <title>Citrus Yield Prediction · 2022 · Top 7% (17 of 257)</title>
    <line x1="260" y1="344" x2="260" y2="253" stroke="#2cb1bc" stroke-width="0.5" opacity="0.25"/>
    <circle cx="260" cy="253" r="5" fill="#2cb1bc"/>
  </g>

  <!-- Traffic Risk · 2025 · Top 8% -->
  <g>
    <title>Traffic Risk Prediction · 2025 · Top 8% (34 of 437)</title>
    <line x1="980" y1="344" x2="980" y2="256" stroke="#2cb1bc" stroke-width="0.5" opacity="0.25"/>
    <circle cx="980" cy="256" r="5" fill="#2cb1bc"/>
  </g>

  <!-- Power Consumption · 2023 · Top 9% -->
  <g>
    <title>Power Consumption Forecasting · 2023 · Top 9% (107 of 1,233)</title>
    <line x1="680" y1="344" x2="680" y2="259" stroke="#2cb1bc" stroke-width="0.5" opacity="0.25"/>
    <circle cx="680" cy="259" r="5" fill="#2cb1bc"/>
  </g>

  <!-- ─── TOP 20% POINTS ─── -->

  <!-- Jeju Specialty · 2023 · Top 12% -->
  <g>
    <title>Jeju Specialty Price Forecasting · 2023 · Top 12% (121 of 1,093)</title>
    <line x1="720" y1="344" x2="720" y2="282" stroke="#2cb1bc" stroke-width="0.4" opacity="0.2"/>
    <circle cx="720" cy="282" r="4" fill="#2cb1bc" opacity="0.7"/>
  </g>

  <!-- ─── PRELIMINARY (gray, small) ─── -->
  <g fill="#3a3a3a" opacity="0.85">
    <circle cx="190" cy="330" r="2.5"><title>L-point · 2022 · preliminary</title></circle>
    <circle cx="460" cy="330" r="2.5"><title>Traffic Safety · 2023 · preliminary</title></circle>
    <circle cx="500" cy="330" r="2.5"><title>Air Pollution · 2023 · preliminary</title></circle>
    <circle cx="570" cy="330" r="2.5"><title>Smart Agriculture · 2023 · preliminary</title></circle>
    <circle cx="660" cy="330" r="2.5"><title>Marginalized Communities · 2023 · preliminary</title></circle>
  </g>

  <!-- ─── FOOTER LEGEND ─── -->
  <text x="1140" y="391" text-anchor="end" fill="#3a3a3a"
        font-family="'SF Mono','Menlo',monospace" font-size="9" letter-spacing="0.8">
    y = percentile &nbsp;·&nbsp; gold = medal &nbsp;·&nbsp; teal = Top 10% &nbsp;·&nbsp; gray = preliminary
  </text>
</svg>
